name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS build and tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build tools
        run: brew install swiftlint

      - name: Lint Swift sources
        run: swiftlint lint --strict

      - name: Run RDPKit tests
        timeout-minutes: 10
        run: swift test --no-parallel

      - name: Run example tests
        run: swift test --package-path Examples

      - name: Build RDPClient app
        run: swift build --package-path Examples --product RDPClient

      - name: Build first-frame capture tool
        run: swift build --package-path Examples --product RDPFirstFrameCapture

      - name: Build preflight tool
        run: swift build --package-path Examples --product RDPPreflight

      - name: Build frame benchmark tool
        run: swift build --package-path Examples --product RDPFrameBenchmark

  apple-platforms:
    name: ${{ matrix.name }} build
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            destination: generic/platform=iOS
          - name: tvOS
            destination: generic/platform=tvOS
          - name: Mac Catalyst
            destination: generic/platform=macOS,variant=Mac Catalyst
          - name: visionOS
            destination: generic/platform=visionOS

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build RDPKit
        run: >-
          xcodebuild
          -quiet
          -scheme RDPKit
          -destination '${{ matrix.destination }}'
          CODE_SIGNING_ALLOWED=NO
          build
