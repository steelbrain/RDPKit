name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    name: macOS build and tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install swiftlint

      - name: Lint Swift sources
        run: swiftlint lint --strict

      - name: Run RDPKit tests
        run: swift test

      - name: Build RDPClient app
        run: swift build --package-path Examples --product RDPClient

      - name: Build first-frame capture tool
        run: swift build --package-path Examples --product RDPFirstFrameCapture

      - name: Build preflight tool
        run: swift build --package-path Examples --product RDPPreflight
